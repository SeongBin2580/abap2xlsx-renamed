name: abap2xlsx-rename

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rename-abap2xlsx:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: main

      - name: Prepare output folder
        run: |
          mkdir -p src/abap2xlsx/pp
          touch src/abap2xlsx/pp/__placeholder__.txt

      - name: Mirror and rename abap2xlsx
        uses: abap2xlsx/abap2xlsx-rename-action@main
        with:
          folder: src/abap2xlsx/pp
          patterns: >
            [
              {
                "type": "CLAS",
                "oldName": "^zcl_excel_worksheet_pagebreaks$",
                "newName": "zcl_pp_xls_wsheet_pagebreaks"
              },
              {
                "type": "CLAS",
                "oldName": "^zcl_excel_converter_salv_model$",
                "newName": "zcl_pp_xls_conv_salv_model"
              },
              {
                "type": "CLAS",
                "oldName": "^zcl_excel_converter_salv_table$",
                "newName": "zcl_pp_xls_conv_salv_table"
              },
              {
                "type": "CLAS",
                "oldName": "^zcl_excel_theme_objectdefaults$",
                "newName": "zcl_pp_xls_theme_objectdefault"
              },
              {
                "type": "CLAS",
                "oldName": "^zcl_excel$",
                "newName": "zcl_pp_xls"
              },
              {
                "type": "CLAS",
                "oldName": "^zcl_excel_(?!(worksheet_pagebreaks$|converter_salv_model$|converter_salv_table$|theme_objectdefaults$))",
                "newName": "zcl_pp_xls_"
              },
              {
                "type": "INTF",
                "oldName": "^zif_excel",
                "newName": "zif_pp_xls"
              },
              {
                "type": "CLAS",
                "oldName": "^zcx_excel$",
                "newName": "zcx_pp_xls"
              },
              {
                "type": "CLAS",
                "oldName": "^zcx_excel_",
                "newName": "zcx_pp_xls_"
              },
              {
                "type": "TTYP",
                "oldName": "^zexcel_t",
                "newName": "zppy_xls"
              },
              {
                "type": "TABL",
                "oldName": "^zexcel_s",
                "newName": "zpps_xls"
              },
              {
                "type": "DTEL",
                "oldName": "^zexcel_converter_option_",
                "newName": "zppe_xls_convert_option_"
              },
              {
                "type": "DTEL",
                "oldName": "^zexcel_condition_",
                "newName": "zppe_xls_conditi_"
              },
              {
                "type": "DTEL",
                "oldName": "^zexcel_(?!(converter_option_|condition_))",
                "newName": "zppe_xls_"
              },
              {
                "type": "DOMA",
                "oldName": "^zexcel",
                "newName": "zppd_xls"
              },
              {
                "type": "MSAG",
                "oldName": "^zabap2xlsx$",
                "newName": "zppxlsmsg"
              }
            ]

      - name: Show changed files
        run: git status --short

      - name: Clear duplicated git authorization headers
        run: |
          git config --local --unset-all http.https://github.com/.extraheader || true
          git config --global --unset-all http.https://github.com/.extraheader || true
          git config --local --unset-all http.extraheader || true
          git config --global --unset-all http.extraheader || true

      - name: Commit and push directly to main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A src

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "ABAP: renamed abap2xlsx to PP XLS namespace"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
